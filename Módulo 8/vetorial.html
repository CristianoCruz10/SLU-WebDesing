<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagem Vetorial - Projeto Final</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Imagem Vetorial</h1>
      <p>SVG criado para uso em página web e exportado para formato PNG.</p>
    </header>
    <section class="content">
      <article>
        <h2>Arquivo vetorial</h2>
        <figure>
          <img src="assets/vector-art.png" alt="Imagem vetorial exportada para PNG">
          <figcaption>Visualização do SVG exportado em PNG.</figcaption>
        </figure>
      </article>
      <article>
        <p>Os arquivos abaixo permitem visualizar ou baixar a arte em formato vetorial e em imagem rasterizada.</p>
        <ul class="download-list">
          <li><a href="assets/vector-art.svg" download>Download SVG</a></li>
          <li><a href="assets/vector-art.png" download>Download PNG</a></li>
        </ul>
      </article>
      <article>
        <a href="index.html" class="button">Voltar para o menu</a>
      </article>
    </section>
  </main>
</body>
</html>
